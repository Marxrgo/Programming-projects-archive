<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID STRIKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
  }
  #gameWrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
  #hud {
    width: 500px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
    color: #00ffcc;
    font-size: 12px;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
  }
  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hud-label { color: #005540; font-size: 9px; letter-spacing: 3px; }
  .hud-value { color: #00ffcc; font-size: 16px; font-family: 'Orbitron', monospace; font-weight: 700; }
  #lives-display { display: flex; gap: 4px; }
  .life-icon { color: #ff3366; font-size: 14px; }
  canvas {
    display: block;
    border: 1px solid #003322;
    box-shadow: 0 0 30px rgba(0,255,200,0.1), 0 0 60px rgba(0,255,200,0.05);
  }
  #overlay {
    position: absolute;
    top: 36px;
    left: 0;
    width: 500px;
    height: 650px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    z-index: 10;
  }
  #overlay h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 52px;
    color: #00ffcc;
    letter-spacing: 8px;
    text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc55;
    margin-bottom: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc55; }
    50% { text-shadow: 0 0 30px #00ffcc, 0 0 60px #00ffcc88, 0 0 100px #00ffcc33; }
  }
  .subtitle { color: #005540; font-size: 11px; letter-spacing: 6px; margin-bottom: 50px; font-family: 'Share Tech Mono', monospace; }
  .score-display { font-size: 14px; color: #888; letter-spacing: 3px; margin-bottom: 8px; font-family: 'Share Tech Mono', monospace; }
  .final-score { font-size: 40px; color: #ff3366; font-weight: 900; letter-spacing: 4px; margin-bottom: 40px; text-shadow: 0 0 20px #ff3366; }
  .start-btn {
    background: transparent;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    position: relative;
  }
  .start-btn:hover { background: #00ffcc22; box-shadow: 0 0 20px #00ffcc44; }
  .start-btn::before, .start-btn::after { content: ''; position: absolute; width: 6px; height: 6px; border-color: #00ffcc; border-style: solid; }
  .start-btn::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .start-btn::after { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
  .controls-hint { margin-top: 30px; color: #333; font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; text-align: center; line-height: 2; }
  #wave-announce {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 28px;
    color: #ff3366;
    letter-spacing: 6px;
    text-shadow: 0 0 20px #ff3366;
    pointer-events: none;
    opacity: 0;
    z-index: 5;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="scoreDisplay">000000</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">WAVE</span>
      <span class="hud-value" id="waveDisplay">01</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <div id="lives-display">
        <span class="life-icon">♦</span><span class="life-icon">♦</span><span class="life-icon">♦</span>
      </div>
    </div>
    <div class="hud-item">
      <span class="hud-label">SHIELD</span>
      <span class="hud-value" id="shieldDisplay">100</span>
    </div>
  </div>
  <canvas id="gameCanvas" width="500" height="650"></canvas>
  <div id="overlay">
    <h1>VOID STRIKE</h1>
    <div class="subtitle">DEEP SPACE ENGAGEMENT</div>
    <div class="score-display" id="gameOverLabel" style="display:none">FINAL SCORE</div>
    <div class="final-score" id="finalScore" style="display:none">000000</div>
    <button class="start-btn" id="startBtn" onclick="startGame()">ENGAGE</button>
    <div class="controls-hint">
      ARROWS / WASD — MOVE &nbsp;|&nbsp; SPACE — FIRE<br>
      Z — RAPID FIRE &nbsp;|&nbsp; SHIFT — BOOST SPEED
    </div>
  </div>
  <div id="wave-announce"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let game = { running: false, score: 0, lives: 3, wave: 1, shield: 100 };
let player, bullets, enemies, enemyBullets, particles, stars, powerups;
let keys = {};
let animFrame;
let lastTime = 0;
let fireTimer = 0;
let waveTransition = false;

function initStars() {
  stars = Array.from({length: 130}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    size: Math.random() * 1.5 + 0.2,
    speed: Math.random() * 1.2 + 0.3,
    alpha: Math.random() * 0.7 + 0.3
  }));
}

function initPlayer() {
  player = { x: W/2, y: H - 80, w: 36, h: 44, speed: 280, invincible: 0, thrustAnim: 0 };
}

function initWave() {
  enemies = []; enemyBullets = [];
  let rows = Math.min(2 + Math.floor(game.wave / 2), 5);
  let cols = Math.min(6 + game.wave, 10);
  let startX = (W - cols * 44) / 2 + 22;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let type = r === 0 ? 'elite' : r < 2 ? 'mid' : 'basic';
      enemies.push({
        x: startX + c * 44, y: 60 + r * 44,
        w: 30, h: 30, type,
        hp: type === 'elite' ? 3 : type === 'mid' ? 2 : 1,
        maxHp: type === 'elite' ? 3 : type === 'mid' ? 2 : 1,
        dx: (1 + game.wave * 0.15) * (Math.random() > 0.5 ? 1 : -1),
        fireTimer: Math.random() * 180,
        anim: Math.random() * Math.PI * 2
      });
    }
  }
  powerups = [];
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  game = { running: true, score: 0, lives: 3, wave: 1, shield: 100 };
  bullets = []; particles = []; enemyBullets = [];
  initStars(); initPlayer(); initWave(); updateHUD();
  lastTime = performance.now();
  animFrame = requestAnimationFrame(gameLoop);
}

function gameLoop(ts) {
  let dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  render();
  if (game.running) animFrame = requestAnimationFrame(gameLoop);
}

function update(dt) {
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
  let spd = player.speed * (keys['Shift'] ? 1.7 : 1);
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x + dx * spd * dt));
  player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y + dy * spd * dt));
  player.thrustAnim += dt * 12;
  if (player.invincible > 0) player.invincible -= dt;

  let rapid = keys['z'] || keys['Z'];
  let fireRate = rapid ? 0.1 : 0.22;
  fireTimer -= dt;
  if ((keys[' '] || keys['Space']) && fireTimer <= 0) {
    fireTimer = fireRate;
    bullets.push({ x: player.x, y: player.y - player.h/2, w: 3, h: 14, speed: 620 });
    if (rapid) {
      bullets.push({ x: player.x - 10, y: player.y - 20, w: 2, h: 10, speed: 620, side: true });
      bullets.push({ x: player.x + 10, y: player.y - 20, w: 2, h: 10, speed: 620, side: true });
    }
    spawnParticles(player.x, player.y - player.h/2, '#00ffcc', 3);
  }

  bullets = bullets.filter(b => { b.y -= b.speed * dt; return b.y > -20; });
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.dx * dt; b.y += b.dy * dt;
    return b.y < H + 20 && b.x > -20 && b.x < W + 20;
  });

  stars.forEach(s => { s.y += s.speed * (keys['Shift'] ? 2.5 : 1); if (s.y > H) { s.y = 0; s.x = Math.random() * W; } });

  let edgeHit = false;
  enemies.forEach(e => {
    e.x += e.dx * dt * 60;
    e.anim += dt * 2;
    if (e.x > W - 20 || e.x < 20) edgeHit = true;
    e.fireTimer -= dt;
    if (e.fireTimer <= 0) {
      e.fireTimer = Math.max(3 - game.wave * 0.2, 0.8) + Math.random() * 2;
      let angle = Math.atan2(player.y - e.y, player.x - e.x);
      let spd2 = 150 + game.wave * 15;
      enemyBullets.push({ x: e.x, y: e.y, dx: Math.cos(angle)*spd2, dy: Math.sin(angle)*spd2, r: 3 });
    }
  });
  if (edgeHit) enemies.forEach(e => { e.dx *= -1; e.y += 10; });

  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!b.dead && !e.dead && Math.abs(b.x - e.x) < (b.w/2 + e.w/2) && Math.abs(b.y - e.y) < (b.h/2 + e.h/2)) {
        b.dead = true; e.hp--;
        let c = e.type === 'elite' ? '#ff3366' : e.type === 'mid' ? '#ffaa00' : '#888fff';
        spawnParticles(e.x, e.y, c, 6);
        if (e.hp <= 0) {
          game.score += (e.type === 'elite' ? 300 : e.type === 'mid' ? 150 : 50) * game.wave;
          spawnParticles(e.x, e.y, c, 15);
          if (Math.random() < 0.09) powerups.push({ x: e.x, y: e.y, type: Math.random() < 0.5 ? 'shield' : 'life', vy: 80 });
          e.dead = true;
        }
      }
    });
  });
  bullets = bullets.filter(b => !b.dead);
  enemies = enemies.filter(e => !e.dead);

  if (player.invincible <= 0) {
    enemyBullets.forEach(b => {
      if (!b.dead && Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 22) {
        b.dead = true;
        game.shield -= 25;
        spawnParticles(player.x, player.y, '#ff3366', 12);
        if (game.shield <= 0) {
          game.shield = 100; game.lives--;
          player.invincible = 2;
          spawnParticles(player.x, player.y, '#ff3366', 30);
          updateHUD();
          if (game.lives <= 0) { game.running = false; setTimeout(endGame, 500); }
        }
        updateHUD();
      }
    });
  }
  enemyBullets = enemyBullets.filter(b => !b.dead);

  powerups = powerups.filter(p => {
    p.y += p.vy * dt;
    if (Math.abs(p.x - player.x) < 24 && Math.abs(p.y - player.y) < 24) {
      if (p.type === 'shield') game.shield = Math.min(100, game.shield + 50);
      else game.lives = Math.min(5, game.lives + 1);
      updateHUD();
      spawnParticles(p.x, p.y, p.type === 'shield' ? '#00ffcc' : '#ff3366', 15);
      return false;
    }
    return p.y < H + 20;
  });

  particles = particles.filter(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= dt;
    return p.life > 0;
  });

  if (enemies.length === 0 && !waveTransition) {
    waveTransition = true;
    game.wave++;
    let el = document.getElementById('wave-announce');
    el.textContent = `WAVE ${game.wave}`;
    el.style.opacity = 1;
    setTimeout(() => { el.style.opacity = 0; initWave(); waveTransition = false; updateHUD(); }, 2000);
    updateHUD();
  }
  updateHUD();
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    let angle = Math.random() * Math.PI * 2;
    let spd = Math.random() * 120 + 40;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: Math.random()*0.5+0.2, maxLife: 0.7, color, size: Math.random()*3+1 });
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#010508';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#00ffcc09';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
  for (let i = 0; i < H; i += 50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.size, s.size * 2);
  });
  ctx.globalAlpha = 1;

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = (p.life / p.maxLife) * 0.9;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Enemies
  enemies.forEach(e => {
    let c = e.type === 'elite' ? '#ff3366' : e.type === 'mid' ? '#ffaa00' : '#888fff';
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.maxHp > 1) {
      ctx.fillStyle = '#111';
      ctx.fillRect(-15, -e.h/2 - 8, 30, 4);
      ctx.fillStyle = c;
      ctx.fillRect(-15, -e.h/2 - 8, 30 * (e.hp/e.maxHp), 4);
    }
    ctx.globalAlpha = 0.15; ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(0, 0, 18 + Math.sin(e.anim) * 2, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.fillStyle = c;
    ctx.shadowColor = c; ctx.shadowBlur = 10;
    ctx.beginPath();
    if (e.type === 'elite') {
      ctx.moveTo(0, 14); ctx.lineTo(-14, -14); ctx.lineTo(0, -6); ctx.lineTo(14, -14);
    } else if (e.type === 'mid') {
      ctx.moveTo(0, 12); ctx.lineTo(-10, -10); ctx.lineTo(-4, -4); ctx.lineTo(0, -8); ctx.lineTo(4, -4); ctx.lineTo(10, -10);
    } else {
      ctx.moveTo(0, 10); ctx.lineTo(-8, -10); ctx.lineTo(0, -4); ctx.lineTo(8, -10);
    }
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0; ctx.restore();
  });

  // Powerups
  powerups.forEach(p => {
    let c = p.type === 'shield' ? '#00ffcc' : '#ff3366';
    ctx.save(); ctx.translate(p.x, p.y);
    ctx.globalAlpha = 0.2; ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.fillStyle = c;
    ctx.font = 'bold 14px Orbitron';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.type === 'shield' ? 'S' : '+', 0, 0);
    ctx.restore();
  });

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.save(); ctx.fillStyle = '#ff6644';
    ctx.shadowColor = '#ff6644'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.restore();
  });

  // Player bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.fillStyle = b.side ? '#00ffcc88' : '#00ffcc';
    ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = b.side ? 6 : 12;
    ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    ctx.shadowBlur = 0; ctx.restore();
  });

  // Player ship
  if (player && (player.invincible <= 0 || Math.floor(player.invincible * 10) % 2 === 0)) {
    ctx.save(); ctx.translate(player.x, player.y);
    // Thrust flame
    let tl = 10 + Math.sin(player.thrustAnim) * 6;
    let tw = 5 + Math.sin(player.thrustAnim * 1.3) * 2;
    ctx.fillStyle = 'rgba(0,255,200,0.8)';
    ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(-8, 14); ctx.lineTo(-tw/2, 14); ctx.lineTo(0, 14+tl); ctx.lineTo(tw/2, 14); ctx.lineTo(8, 14);
    ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    // Hull
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.moveTo(0, -22); ctx.lineTo(-14, 8); ctx.lineTo(-6, 4); ctx.lineTo(-6, 14); ctx.lineTo(6, 14); ctx.lineTo(6, 4); ctx.lineTo(14, 8);
    ctx.closePath(); ctx.fill();
    // Cockpit
    ctx.shadowBlur = 0; ctx.fillStyle = '#001a12';
    ctx.beginPath(); ctx.ellipse(0, -6, 5, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Shield bar
  let sw = 120;
  ctx.fillStyle = '#111';
  ctx.fillRect(W/2 - sw/2, H - 12, sw, 4);
  ctx.fillStyle = game.shield > 50 ? '#00ffcc' : game.shield > 25 ? '#ffaa00' : '#ff3366';
  ctx.fillRect(W/2 - sw/2, H - 12, sw * (game.shield/100), 4);
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = String(game.score).padStart(6, '0');
  document.getElementById('waveDisplay').textContent = String(game.wave).padStart(2, '0');
  document.getElementById('shieldDisplay').textContent = Math.max(0, game.shield);
  let ld = document.getElementById('lives-display');
  ld.innerHTML = '';
  for (let i = 0; i < Math.max(game.lives, 0); i++) ld.innerHTML += '<span class="life-icon">♦</span>';
  for (let i = Math.max(game.lives, 0); i < 3; i++) ld.innerHTML += '<span class="life-icon" style="color:#111">♦</span>';
}

function endGame() {
  cancelAnimationFrame(animFrame);
  let overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  document.getElementById('gameOverLabel').style.display = 'block';
  document.getElementById('finalScore').style.display = 'block';
  document.getElementById('finalScore').textContent = String(game.score).padStart(6, '0');
  document.getElementById('startBtn').textContent = 'RETRY';
}

window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => { keys[' '] = true; e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove', e => {
  let t = e.touches[0];
  let r = canvas.getBoundingClientRect();
  let cx = t.clientX - r.left - W/2;
  let cy = t.clientY - r.top - H/2;
  keys['ArrowLeft'] = cx < -20; keys['ArrowRight'] = cx > 20;
  keys['ArrowUp'] = cy < -20; keys['ArrowDown'] = cy > 20;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { keys = {}; });
</script>
</body>
</html>
